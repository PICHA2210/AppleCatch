<!DOCTYPE html><html lang='ja'><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Apple Catch V4</title>
<style>
body{margin:0;background:#ffe8f4;font-family:sans-serif;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}
header{text-align:center;background:#fff8fc;padding:8px}
#controls{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
button{border:none;border-radius:999px;padding:8px 14px;background:#ff90ba;color:#fff}
.time.active{background:#ff5f97}
#status{display:flex;justify-content:space-around;padding:8px;color:#d65784;font-weight:700}
#game{flex:1;position:relative;background:linear-gradient(#ffeaf5,#ffd7eb);overflow:hidden}
.apple{position:absolute;font-size:58px;transform:translate(-50%,-50%)}
#message,#finish{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#message{font-size:92px}
#finish{display:none;color:#ff3b30;font-size:44px;font-weight:900;text-align:center;text-shadow:0 2px #fff}
#basketArea{height:130px;background:#fff8e5;border-top:4px dashed #f2c36a;position:relative}
#basket{position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:70px}
#hint{position:absolute;top:-32px;width:100%;text-align:center;color:#ff7d9d;font-weight:700}
</style></head><body>
<div id=app>
<header><h2>🍎りんごを つかまえよう🧺</h2>
<div id=controls>
<button class='time active' data-sec='15'>15びょう</button>
<button class=time data-sec='30'>30びょう</button>
<button class=time data-sec='45'>45びょう</button>
<button id=start>スタート</button>
<button id=reset>やりなおし</button>
</div></header>
<div id=status><div>⏰<span id=time>15</span></div><div>🍎<span id=score>0</span>こ</div></div>
<div id=game><div id=message></div><div id=finish></div></div>
<div id=basketArea><div id=hint>🍎 このあたりでキャッチ 🍎</div><div id=basket>🧺</div></div>
</div>
<script>
let duration=15,timeLeft=15,score=0,running=false,spawnSpeed=1200;
const game=document.getElementById('game'),basket=document.getElementById('basket');
const msg=document.getElementById('message'),finish=document.getElementById('finish');
const scoreEl=document.getElementById('score'),timeEl=document.getElementById('time');
let apples=[],spawn,timer;

document.querySelectorAll('.time').forEach(b=>b.onclick=()=>{
document.querySelectorAll('.time').forEach(x=>x.classList.remove('active'));
b.classList.add('active');duration=+b.dataset.sec;timeEl.textContent=duration;});

start.onclick=()=>{if(running){spawnSpeed=Math.max(350,spawnSpeed-120);clearInterval(spawn);spawn=setInterval(makeApple,spawnSpeed);return;}begin();}
reset.onclick=resetGame;

function begin(){
resetGame(false);running=true;spawnSpeed=1200;timeLeft=duration;score=0;
scoreEl.textContent=0;timeEl.textContent=timeLeft;finish.style.display='none';
spawn=setInterval(makeApple,spawnSpeed);
timer=setInterval(()=>{timeLeft--;timeEl.textContent=timeLeft;if(timeLeft<=0)end();},1000);
requestAnimationFrame(loop);
}
function resetGame(clear=true){
running=false;clearInterval(spawn);clearInterval(timer);
apples.forEach(a=>a.el.remove());apples=[];
if(clear){finish.style.display='none';msg.textContent='';scoreEl.textContent=0;}
}
function end(){running=false;clearInterval(spawn);clearInterval(timer);
finish.style.display='flex';
finish.innerHTML='🍎<br>'+score+'こ とれたね！<br>すごい！';}
function makeApple(){
let el=document.createElement('div');el.className='apple';el.textContent='🍎';
let x=80+Math.random()*(innerWidth-160);
game.appendChild(el);
apples.push({x,y:-40,speed:1.2+Math.random()*0.3,el});
}
function loop(){
if(!running)return;
apples.forEach(a=>{
a.y+=a.speed;
a.el.style.left=a.x+'px';
a.el.style.top=a.y+'px';
if(a.y>game.clientHeight+80){a.remove=true;a.el.remove();}
});
apples=apples.filter(a=>!a.remove);
requestAnimationFrame(loop);
}
function move(x){
let rect=basketArea.getBoundingClientRect();
let px=Math.max(45,Math.min(x-rect.left,rect.width-45));
basket.style.left=px+'px';
let hit=apples.find(a=>a.y>game.clientHeight-140 && Math.abs(a.x-px)<52);
if(hit&&running){
hit.remove=true;hit.el.remove();
score++;scoreEl.textContent=score;
msg.textContent='🎉🍎✨';
setTimeout(()=>msg.textContent='',550);
}
}
basketArea.ontouchstart=e=>move(e.touches[0].clientX);
basketArea.ontouchmove=e=>{e.preventDefault();move(e.touches[0].clientX);}
basketArea.onclick=e=>move(e.clientX);
</script></body></html>
